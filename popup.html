<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; }
        h3 { margin-top: 0; color: #333; text-align: center; }
        label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }
        textarea { resize: vertical; height: 80px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
        #status { text-align: center; font-size: 12px; color: green; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <h3>Vault Guard Settings</h3>
    
    <label>Set Master Password:</label>
    <input type="password" id="passwordInput" placeholder="Enter new password">
    
    <label>Blocked Websites (comma separated):</label>
    <textarea id="sitesInput" placeholder="e.g., facebook.com, instagram.com, twitter.com"></textarea>
    
    <button id="saveBtn">Save Settings</button>
    <div id="status">Settings Saved Successfully!</div>

    <script src="popup.js"></script>
</body>
</html>
